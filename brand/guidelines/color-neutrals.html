<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — Navy / Slate spine" subtitle="Backgrounds, surfaces, borders & text" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .sw { width: 78px; height: 96px; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.08); }
  .name { font-size: 10px; font-weight: 600; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); margin-top: 2px; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background: var(--navy-950)"><span class="name">950</span><span class="hex">#0a1222</span></div>
  <div class="sw" style="background: var(--navy-900)"><span class="name">900 · app</span><span class="hex">#0f172a</span></div>
  <div class="sw" style="background: var(--navy-800)"><span class="name">800 · card</span><span class="hex">#1e293b</span></div>
  <div class="sw" style="background: var(--navy-700)"><span class="name">700 · border</span><span class="hex">#334155</span></div>
  <div class="sw" style="background: var(--navy-500)"><span class="name">500</span><span class="hex">#64748b</span></div>
  <div class="sw" style="background: var(--navy-400)"><span class="name" style="color:#0f172a">400 · muted</span><span class="hex" style="color:rgba(15,23,42,.55)">#94a3b8</span></div>
  <div class="sw" style="background: var(--navy-200)"><span class="name" style="color:#0f172a">200 · text</span><span class="hex" style="color:rgba(15,23,42,.55)">#e2e8f0</span></div>
  <div class="sw" style="background: var(--navy-050)"><span class="name" style="color:#0f172a">050</span><span class="hex" style="color:rgba(15,23,42,.55)">#f8fafc</span></div>
</div>
</body></html>
