<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 28px; display: flex; align-items: center; gap: 48px; }
  .lock { display: flex; align-items: center; gap: 16px; }
  .wm { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-strong); }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 10px; }
</style></head>
<body>
<div>
  <div class="lock">
    <img src="../assets/sovi-mark.svg" width="56" height="56" alt="Sovi mark" />
    <span class="wm">Sovi</span>
  </div>
  <p class="cap">mark + wordmark · clearspace = mark height</p>
</div>
<div style="display:flex; align-items:center; gap:16px;">
  <img src="../assets/sovi-mark.svg" width="56" height="56" alt="Sovi mark on tile" />
  <div style="background:var(--bg-raised); border:1px solid var(--border-hairline); border-radius:var(--radius-md); padding:16px; display:flex;">
    <img src="../assets/sovi-mark-bare.svg" width="40" height="40" alt="Sovi mark, freestanding" />
  </div>
</div>
</body></html>
