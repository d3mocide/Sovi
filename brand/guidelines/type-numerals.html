<!-- @dsCard group="Type" viewport="700x180" name="Display numerals — JetBrains Mono" subtitle="Balances, countdowns & figures read as data" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 24px; color: var(--text-strong); }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px; }
  .num { font-family: var(--font-mono); font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
</style></head>
<body>
<p class="eyebrow">Debt-free in</p>
<div style="display:flex; align-items:baseline; gap:10px;">
  <span class="num" style="font-size:56px; color:var(--accent)">14</span>
  <span style="font-size:20px; color:var(--text-muted); font-weight:500">months</span>
  <span class="num" style="font-size:32px; color:var(--positive); margin-left:24px">$1,284</span>
  <span class="num" style="font-size:20px; color:var(--text-strong)">$18,240</span>
</div>
</body></html>
