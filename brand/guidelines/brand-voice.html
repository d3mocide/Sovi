<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 24px; color: var(--text-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cell { background: var(--surface-card); border: 1px solid var(--border-hairline); border-radius: var(--radius-md); padding: 14px 16px; font-size: 13px; }
  .do { color: var(--positive); font-weight: 600; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; margin: 0 0 6px; }
  .dont { color: var(--attention); font-weight: 600; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; margin: 0 0 6px; }
  p.s { margin: 0; color: var(--text-secondary); }
</style></head>
<body>
<div class="grid">
  <div class="cell"><p class="do">We say</p><p class="s">"Debt-free in 14 months."</p></div>
  <div class="cell"><p class="dont">Not</p><p class="s">"You still owe a frightening $18,240!"</p></div>
  <div class="cell"><p class="do">We say</p><p class="s">"Your numbers. Your stack. Your control."</p></div>
  <div class="cell"><p class="dont">Not</p><p class="s">"Bank-grade, AI-powered, cloud-synced finance."</p></div>
</div>
</body></html>
