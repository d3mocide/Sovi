<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Quiet cool shadows — depth from contrast, not weight" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 28px; }
  .row { display: flex; gap: 24px; }
  .box { flex: 1; height: 90px; background: var(--surface-card); border: 1px solid var(--border-hairline); border-radius: var(--radius-md); display: flex; align-items: flex-end; padding: 10px; box-sizing: border-box; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style></head>
<body>
<div class="row">
  <div class="box" style="box-shadow:var(--shadow-card)"><span class="t">shadow-card</span></div>
  <div class="box" style="box-shadow:var(--shadow-pop)"><span class="t">shadow-pop</span></div>
  <div class="box" style="box-shadow:var(--shadow-modal)"><span class="t">shadow-modal</span></div>
  <div class="box" style="box-shadow:var(--shadow-focus); border-color:var(--accent)"><span class="t">focus ring</span></div>
</div>
</body></html>
