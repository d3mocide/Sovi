<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px rhythm on a 4px base" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { text-align: center; }
  .bar { background: var(--accent); border-radius: 2px; width: 100%; }
  .t { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 6px; }
</style></head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px"></div><div class="t">1·4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="t">2·8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="t">3·12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="t">4·16</div></div>
  <div class="col"><div class="bar" style="height:20px"></div><div class="t">5·20</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="t">6·24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="t">8·32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="t">12·48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="t">16·64</div></div>
</div>
</body></html>
