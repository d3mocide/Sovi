secrets:
  master_key:
    file: ./secrets/master_key.txt
  db_password:
    file: ./secrets/db_password.txt

networks:
  internal:

volumes:
  postgres_data:
  redis_data:

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      MASTER_KEY_FILE: /run/secrets/master_key
    secrets:
      - master_key
      - db_password
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PASSWORD_FILE: /run/secrets/db_password
      MASTER_KEY_FILE: /run/secrets/master_key
      PYTHONPATH: /app:/api
    secrets:
      - master_key
      - db_password
    volumes:
      - ./api:/api:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sovi}
      POSTGRES_USER: ${DB_USER:-sovi}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sovi} -d ${DB_NAME:-sovi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
