server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

jwt_secret: changeme

default_redirection_url: https://localhost

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      salt_length: 16
      parallelism: 8
      memory: 64

access_control:
  default_policy: deny
  rules:
    - domain: "*.localhost"
      policy: two_factor

session:
  name: authelia_session
  domain: localhost
  secret: changeme
  expiration: 1h
  inactivity: 5m
  redis:
    host: redis
    port: 6379

storage:
  encryption_key: changeme_some_long_key_32_bytes_or_more
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
